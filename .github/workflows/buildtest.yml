name: Build and Unit Test

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: buildtest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build, Lint, Unit Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and verify
        run: |
          ./gradlew --stacktrace --no-daemon assembleDebug lint testDebugUnitTest jacocoTestReport

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
            app/build/reports/jacoco/jacocoTestReport/html/**
          retention-days: 14

      - name: Upload Sonar Test Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-test-report
          path: app/build/test-results/testDebugUnitTest/**
          retention-days: 14

      - name: Upload Unit Test Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**
          retention-days: 14
