name: Integration and Emulator E2E Tests

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: emulator-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator_e2e:
    name: Firebase Emulator + Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Firebase Emulators
        run: firebase emulators:start &
        env:
          FIREBASE_TOKEN: ${{ secrets.FB_TOKEN }}

      - name: Wait for emulators to be ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:4400; do sleep 2; done'

      - name: Run integration and instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew --stacktrace --no-daemon connectedDebugAndroidTest
        env:
          FIREBASE_EMULATOR_HOST: localhost

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: |
            app/build/reports/androidTests/connected/**
            app/build/outputs/androidTest-results/connected/**
          retention-days: 14
