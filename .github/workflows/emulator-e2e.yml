name: Android Emulator Test

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  android_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Verify Java
        run: java -version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Android tests with Firebase emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          JAVA_HOME: ${{ steps.setup-java.outputs.path }}
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          script: firebase emulators:exec --project demo-test --only database -- ./gradlew --stacktrace --no-daemon connectedDebugAndroidTest

