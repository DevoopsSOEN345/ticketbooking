name: Integration and Emulator E2E Tests

on:
  workflow_call:

jobs:
  emulator_e2e:
    name: Firebase Emulator + Instrumented Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          # We start Firebase INSIDE the runner script so it stays alive during tests
          script: |
            firebase emulators:start --host 0.0.0.0 & 
            timeout 60 bash -c 'until curl -sf http://localhost:4400; do sleep 5; done'
            ./gradlew connectedDebugAndroidTest --stacktrace
        env:
          FIREBASE_TOKEN: ${{ secrets.FB_TOKEN }}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: |
            app/build/reports/androidTests/connected/**
            app/build/outputs/androidTest-results/connected/**