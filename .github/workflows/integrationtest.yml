name: Integration Tests

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: integration-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration_android_test:
    name: Android Integration (Instrumentation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_7
          script: ./gradlew --stacktrace --no-daemon connectedDebugAndroidTest

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
          retention-days: 7
