name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Unit Test
    uses: ./.github/workflows/buildtest.yml
    secrets: inherit

  sonarqube_analysis:
    name: SonarQube Analysis (Gating)
    needs: build_and_test
    uses: ./.github/workflows/sonarqube.yml
    secrets: inherit

  ci_done:
    name: CI Done (Gating)
    runs-on: ubuntu-latest
    needs: sonarqube_analysis
    if: ${{ always() }}
    steps:
      - name: Finish gating check
        run: echo "Build + Sonar gating path completed."