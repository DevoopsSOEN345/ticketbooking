name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Unit Test
    uses: ./.github/workflows/buildtest.yml
    secrets: inherit

  sonarqube_analysis:
    name: SonarQube Analysis (Gating)
    needs: build_and_test
    uses: ./.github/workflows/sonarqube.yml
    secrets: inherit

  integration_tests:
    name: Integration Tests (Non-Gating)
    needs: build_and_test
    uses: ./.github/workflows/integrationtest.yml
    secrets: inherit

  end_to_end_tests:
    name: End-to-End Regression (Non-Gating)
    needs: integration_tests
    uses: ./.github/workflows/end2endtest.yml
    secrets: inherit
