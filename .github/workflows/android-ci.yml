name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build, Lint, Unit Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and verify
        run: |
          ./gradlew --stacktrace --no-daemon assembleDebug lint testDebugUnitTest jacocoTestReport

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload CI reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/jacoco/**
          retention-days: 7

  reports_and_artifactory:
    name: Reports Artifact + Artifactory Publish
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download CI reports artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-reports
          path: .artifacts/ci-reports

      - name: Archive reports for Artifactory
        run: |
          tar -czf ci-analysis-reports.tar.gz -C .artifacts ci-reports

      - name: Publish reports to Artifactory
        if: ${{ secrets.ARTIFACTORY_URL != '' && secrets.ARTIFACTORY_REPO != '' && secrets.ARTIFACTORY_USERNAME != '' && secrets.ARTIFACTORY_TOKEN != '' }}
        run: |
          curl --fail --silent --show-error \
            -u "${{ secrets.ARTIFACTORY_USERNAME }}:${{ secrets.ARTIFACTORY_TOKEN }}" \
            -T ci-analysis-reports.tar.gz \
            "${{ secrets.ARTIFACTORY_URL }}/${{ secrets.ARTIFACTORY_REPO }}/ci/${{ github.repository }}/${{ github.run_id }}/ci-analysis-reports.tar.gz"

  integration_tests:
    name: Integration Tests
    needs: build_and_test
    uses: ./.github/workflows/integrationtest.yml
    secrets: inherit

  end_to_end_tests:
    name: End-to-End Regression
    needs: integration_tests
    uses: ./.github/workflows/end2endtest.yml
    secrets: inherit

  sonarqube_analysis:
    name: SonarQube Analysis
    needs: end_to_end_tests
    uses: ./.github/workflows/sonarqube.yml
    secrets: inherit
