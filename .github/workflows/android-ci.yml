name: CI
on:
  push:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

  workflow_dispatch: 

jobs:
  build_and_sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

  ci_done:
    name: CI Done (Gating)
    runs-on: ubuntu-latest
    needs: sonarqube_analysis
    if: ${{ always() }}
    steps:
      - name: Finish gating check
        run: echo "Build + Sonar gating path completed."
