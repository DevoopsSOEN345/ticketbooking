name: Android CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build and Unit Test
    uses: ./.github/workflows/buildtest.yml
    secrets: inherit

  sonarqube_analysis:
    name: SonarQube Analysis (Gating)
    needs: build_and_test
    uses: ./.github/workflows/sonarqube.yml
    secrets: inherit
  
  performance_testing:
    name: JMeter Performance Gate
    needs: build_and_test
    uses: ./.github/workflows/jmeter.yml
    secrets: inherit 

