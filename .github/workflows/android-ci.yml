name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch: 

jobs:
  build_and_sonar:
    name: Build, Test & Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build, Test & Coverage
        run: ./gradlew assembleDebug testDebugUnitTest jacocoTestReport

      - name: SonarCloud Scan
        run: ./gradlew :app:sonar
          -Dsonar.projectKey=${{ secrets.PROJECT_KEY }}
          -Dsonar.organization=devoopssoen345
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          -Dsonar.java.binaries=app/build/intermediates/javac/debug/compileDebugJavaWithJavac/classes
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}