name: End-to-End Regression

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: e2e-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  end_to_end:
    name: E2E Regression (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build E2E test binaries
        run: ./gradlew --stacktrace --no-daemon assembleDebug assembleDebugAndroidTest

      - name: Run E2E regression suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_7
          script: ./gradlew --stacktrace --no-daemon connectedDebugAndroidTest

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/**
            app/build/outputs/androidTest-results/**
          retention-days: 7
