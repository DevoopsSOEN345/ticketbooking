name: SonarQube Analysis

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: true
      PROJECT_KEY:
        required: true

permissions:
  contents: read

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .artifacts/coverage-report

      - name: Download JVM Binaries Artifact
        uses: actions/download-artifact@v4
        with:
          name: jvm-binaries
          path: .artifacts/jvm-binaries

      - name: Resolve JVM binary directories
        id: resolve_binaries
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find .artifacts/jvm-binaries -type d \( -name classes -o -path '*/kotlin-classes/*' \))
          if [ "${#dirs[@]}" -eq 0 ]; then
            echo "No compiled class directories found under .artifacts/jvm-binaries" >&2
            find .artifacts/jvm-binaries -maxdepth 6 -type d | cat
            exit 1
          fi
          binaries=$(IFS=,; echo "${dirs[*]}")
          echo "binaries=${binaries}" >> "$GITHUB_OUTPUT"

      - name: Download Sonar Test Report Artifact
        uses: actions/download-artifact@v4
        with:
          name: sonar-test-report
          path: .artifacts/sonar-test-report

      - name: Run SonarQube scan on downloaded coverage
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.PROJECT_KEY }}
            -Dsonar.sources=app/src/main/java
            -Dsonar.tests=app/src/test/java,app/src/androidTest/java
            -Dsonar.java.binaries=${{ steps.resolve_binaries.outputs.binaries }}
            -Dsonar.junit.reportPaths=.artifacts/sonar-test-report
            -Dsonar.coverage.jacoco.xmlReportPaths=.artifacts/coverage-report/jacocoTestReport.xml

      - name: Check SonarQube Quality Gate
        id: quality_gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Add JaCoCo coverage summary to GitHub Actions
        env:
          QUALITY_GATE_STATUS: ${{ steps.quality_gate.outputs.quality-gate-status }}
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          report = Path(".artifacts/coverage-report/jacocoTestReport.xml")
          if not report.exists():
              raise SystemExit(f"JaCoCo XML not found: {report}")

          root = ET.parse(report).getroot()
          line_counter = next((c for c in root.findall("counter") if c.get("type") == "LINE"), None)
          if line_counter is None:
              raise SystemExit("LINE counter missing in JaCoCo XML")

          missed = int(line_counter.get("missed", "0"))
          covered = int(line_counter.get("covered", "0"))
          total = missed + covered
          coverage = (covered / total * 100.0) if total else 0.0
          quality_gate = os.environ.get("QUALITY_GATE_STATUS", "unknown")

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "## Coverage Report\n"
              f"- JaCoCo line coverage: **{coverage:.2f}%**\n"
              f"- Covered lines: `{covered}`\n"
              f"- Missed lines: `{missed}`\n"
              f"- Sonar quality gate: **{quality_gate}**\n",
              encoding="utf-8",
          )
          PY
