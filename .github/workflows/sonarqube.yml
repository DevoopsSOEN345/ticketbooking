name: SonarQube Analysis

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sonarqube-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests and generate JaCoCo coverage report
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --no-build-cache

      - name: Verify JaCoCo report was generated
        run: |
          if [ -f "app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml" ]; then
            echo "✅ JaCoCo XML report found"
            head -20 app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          else
            echo "❌ JaCoCo XML report NOT found at app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"
            find app/build -name "*.xml" -type f 2>/dev/null | head -10
          fi

      - name: SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

