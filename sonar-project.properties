# SonarCloud project metadata
sonar.organization=devoopssoen345
sonar.projectKey=DevoopsSOEN345_ticketbooking
sonar.host.url=https://sonarcloud.io

# Source and test locations (Android/Gradle JVM module)
sonar.sources=app/src/main/java
sonar.tests=app/src/test/java,app/src/androidTest/java

# Java binaries for Android debug build
sonar.java.binaries=app/build/intermediates/javac/debug/compileDebugJavaWithJavac/classes

# JaCoCo XML path for coverage analysis
sonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

# Unit test report path
sonar.junit.reportPaths=app/build/test-results/testDebugUnitTest

# Code exclusions
sonar.exclusions=**/*Test.java,**/*Test.kt,**/BuildConfig.java,**/R.java,**/R$*.java
